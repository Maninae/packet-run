<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Packet Run</title>
  <meta name="description" content="A roguelite for ages 9–12 where real networking is the game mechanics. Guide a message across the internet — storms, jams, sniffers, oceans — and feel how it really works.">
  <meta property="og:title" content="Packet Run">
  <meta property="og:description" content="You're a message trying to get home. A kids' roguelite where every hazard, tool, and tradeoff is real networking.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0e1613">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- Portrait-first shell (design/08-art.md): meters / map / prompt / party / belt
       on a 6" screen. Desktop derives from this column, never vice versa. -->
  <main id="game">
    <header id="meters">
      <div id="meter-bandwidth" class="meter" role="status" aria-label="Bandwidth"></div>
      <div id="meter-deadline" class="meter" role="status" aria-label="Deadline"></div>
      <span id="act-chip" class="seed-chip act-chip" aria-label="Current act"></span>
      <span id="seed-chip" class="seed-chip" aria-label="Run seed"></span>
      <button id="mute" class="mute-btn" aria-label="Toggle sound"></button>
    </header>

    <section id="stage" aria-label="Region map">
      <svg id="map-layer" xmlns="http://www.w3.org/2000/svg" role="img"
           aria-label="Map of the region: two roads from home to the dock"></svg>
      <canvas id="live-layer" aria-hidden="true"></canvas>
      <!-- The Static itself: looms over the arena during the Act-5 duel -->
      <svg id="villain" class="static-villain" viewBox="-40 -30 80 58" aria-hidden="true">
        <path d="M-34 18 L-28 -8 L-18 -2 L-10 -22 L0 -12 L10 -26 L18 -6 L28 -14 L34 16 L24 12 L14 20 L2 12 L-12 22 L-24 12 Z"
              fill="var(--bg-deep)" stroke="var(--fragment-corrupt)" stroke-width="1.6" opacity="0.92"/>
        <path d="M-26 2 h52 M-30 8 h60 M-22 -6 h44" stroke="var(--fragment-corrupt)"
              stroke-width="1" opacity="0.35"/>
        <circle cx="-9" cy="-2" r="3.4" fill="var(--fragment-corrupt)"/>
        <rect x="6" y="-6" width="7" height="4" fill="var(--fragment-corrupt)"/>
        <path d="M-6 10 l4 -3 l4 3 l4 -3" fill="none" stroke="var(--fragment-corrupt)"
              stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
      </svg>
      <button id="glyph-legend" class="legend-chip" aria-label="What do the map symbols mean?">?</button>
    </section>

    <section id="prompt" aria-live="polite"><!-- forecast captions & beat text --></section>

    <section id="party" aria-label="Your party"><!-- Pip + fragment chips (js/party.js) --></section>

    <footer id="belt" aria-label="Toolbelt"><!-- tool buttons (js/hud.js) --></footer>
  </main>
  <div id="overlay"><!-- start / win / loss screens (js/screens.js) --></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
