<title>Gate P1 mock — Act 2 road view</title>
<!-- Backbone City reskin of road-act1.html (design/11 step 1).
     Same skeleton — trunk forks into short LEFT + long RIGHT, both rejoin at
     the destination (now Ava's tower, not Grandma's house) — but every layer
     is repainted for the neon-dusk city biome (css/base.css body.act-2):
     · sky: deep indigo → violet with a magenta glow band + stars
     · far: chunky city skyline silhouettes with tiny lit windows + moon
     · mid: closer neon-edged towers, a blinking radio mast, elevated cable
       trays crossing between rooftops
     · roads: dark asphalt-indigo ribbons with CYAN-MINT edge light
       (--road-pick #6ee8c8) and a bright dash centerline
     · LEFT hazard is a congestion JAM — boxy packet/vehicles clotted ON the
       road with amber hazard glow and blinking hazards (not a storm cloud);
       the road stains amber down its length just like Act 1
     · destination is Ava's tower — apartment tower with one warm lit window
       and a warm glow, tucked between the arc ends on the horizon
     · roadside: neon street signs, traffic bollards, a warm café glow;
       fireflies become floating neon motes
     Color invariants (color = pedagogy): hazard amber (#f4a259/#ff9440) ONLY
     on the jam + its road stain; fragments stay cyan (#6ee7ff); Pip stays
     gold (#ffd166); no other saturated warm-orange element on screen.
     Animation classes live on INNER groups (CSS transform overrides the
     SVG transform attribute). "quiet" text kept: 1:1 with the in-game chip. -->
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0c0a19; overflow: hidden; }
  .scene { position: fixed; inset: 0; }
  svg { width: 100%; height: 100%; display: block; }

  .tag {
    position: fixed; top: 10px; left: 12px; z-index: 2;
    font: 600 11px ui-monospace, Menlo, monospace; letter-spacing: 0.05em;
    color: rgba(230, 220, 255, 0.7); background: rgba(20, 12, 40, 0.6);
    padding: 4px 8px; border-radius: 6px;
  }

  .float   { animation: float 2.8s ease-in-out infinite alternate; }
  .float2  { animation: float 3.4s ease-in-out infinite alternate-reverse; }
  .bob     { animation: bob 3.6s ease-in-out infinite alternate; }
  .twinkle { animation: twinkle 2.2s ease-in-out infinite alternate; }
  .twinkle2{ animation: twinkle 3.1s ease-in-out infinite alternate-reverse; }
  .blink   { animation: blink 2.4s steps(1) infinite; }
  .blink2  { animation: blink 1.6s steps(1) infinite; }
  @keyframes float   { from { transform: translateY(-5px); } to { transform: translateY(6px); } }
  @keyframes bob     { from { transform: translateY(-4px); } to { transform: translateY(5px); } }
  @keyframes twinkle { from { opacity: 0.25; } to { opacity: 0.9; } }
  @keyframes blink   { 0% { opacity: 1; } 55% { opacity: 0.15; } 100% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .float, .float2, .bob, .twinkle, .twinkle2, .blink, .blink2 { animation: none; }
  }
</style>
</head>
