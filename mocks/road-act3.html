<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gate P1 mock — Act 3 road view (Ocean Crossing)</title>
<!-- Gate P1 mock, Act 3 "The Ocean Crossing" reskin of road-act1.html.
     Same skeleton (viewBox 1280x800, trunk forking + both arcs arriving at
     Kenji's, LEFT/RIGHT signposts, 5 numbered cyan fragments + gold Pip
     leading, shadows under everything, same CSS animation classes with
     reduced-motion respect). Reskin: underwater world column, cables not
     roads, seabed ridges, distant shore.
     Curriculum flip vs Act 1:
       · LEFT road is the TRENCH shortcut — dips through a canyon.
         Sign: safe-aqua "+3" (bandwidth pickup), 4 hop dots. NO amber
         stain — the trench is a BONUS, not a sweeper.
       · RIGHT road is the SATELLITE bounce — cable rises toward a surface
         buoy. Sign: amber "slow", 6 hop dots. Right ribbon carries the
         subtle amber tint near the rise (500ms danger read).
     Color pedagogy invariants:
       · warning/hazard/slow  = amber #f4a259 ONLY
       · fragments             = cyan #6ee7ff
       · Pip                   = gold #ffd166 (his glow reads underwater)
     Bioluminescent plankton stand in for fireflies. -->
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #060d16; overflow: hidden; }
  .scene { position: fixed; inset: 0; }
  svg { width: 100%; height: 100%; display: block; }

  .tag {
    position: fixed; top: 10px; left: 12px; z-index: 2;
    font: 600 11px ui-monospace, Menlo, monospace; letter-spacing: 0.05em;
    color: rgba(214, 240, 255, 0.65); background: rgba(6, 13, 22, 0.6);
    padding: 4px 8px; border-radius: 6px;
  }

  .float   { animation: float 2.8s ease-in-out infinite alternate; }
  .float2  { animation: float 3.4s ease-in-out infinite alternate-reverse; }
  .bob     { animation: bob 3.6s ease-in-out infinite alternate; }
  .twinkle { animation: twinkle 2.2s ease-in-out infinite alternate; }
  .twinkle2{ animation: twinkle 3.1s ease-in-out infinite alternate-reverse; }
  .blink   { animation: blink 2.4s steps(1) infinite; }
  .drift   { animation: drift 6s ease-in-out infinite alternate; }
  .rise    { animation: rise 5s linear infinite; }
  .rise2   { animation: rise 7s linear infinite; }
  @keyframes float   { from { transform: translateY(-5px); } to { transform: translateY(6px); } }
  @keyframes bob     { from { transform: translateY(-4px); } to { transform: translateY(5px); } }
  @keyframes twinkle { from { opacity: 0.25; } to { opacity: 0.9; } }
  @keyframes blink   { 0% { opacity: 1; } 55% { opacity: 0.15; } 100% { opacity: 1; } }
  @keyframes drift   { from { transform: translateX(-8px); } to { transform: translateX(9px); } }
  @keyframes rise    { 0% { transform: translateY(0); opacity: 0; }
                       15% { opacity: 0.9; }
                       100% { transform: translateY(-120px); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .float, .float2, .bob, .twinkle, .twinkle2, .blink, .drift, .rise, .rise2 { animation: none; }
  }
</style>
</head>
<body>
<div class="tag">GATE P1 MOCK · ACT 3 · THE OCEAN CROSSING · road view · v1</div>
<div class="scene">
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMax slice" role="img"
     aria-label="Underwater scene: glowing aqua sea cables run along a seabed and fork ahead. The left cable dips through a bonus trench canyon; the right cable rises toward a surface satellite buoy and is tinted amber for slow. Both cables arrive at Kenji's glowing beach house on a far shore. A party of five cyan packet fragments follows a gold Pip through the deep.">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0e3a5e"/>
      <stop offset="0.35" stop-color="#114a6a"/>
      <stop offset="0.7"  stop-color="#0a2a44"/>
      <stop offset="1"    stop-color="#061a2e"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9e6ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a9e6ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="homeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#ffe6a8" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#ffd166" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="buoyGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f4a259" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f4a259" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="trenchGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6fd6ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6fd6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="seabed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d2a44"/>
      <stop offset="1" stop-color="#050f1c"/>
    </linearGradient>
    <linearGradient id="cableBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123a56"/>
      <stop offset="1" stop-color="#1c5378"/>
    </linearGradient>
    <linearGradient id="slowStain" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0"    stop-color="#f4a259" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#f4a259" stop-opacity="0.28"/>
      <stop offset="1"    stop-color="#e8944c" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="fragGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6ee7ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6ee7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pipGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3c4" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="trenchDark" cx="0.5" cy="0.35" r="0.65">
      <stop offset="0" stop-color="#000814" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#050f1c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="soft2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- ===================== WATER COLUMN ===================== -->
  <rect width="1280" height="314" fill="url(#sky)"/>
  <!-- surface wave ceiling: a hint of daylight above -->
  <g opacity="0.6">
    <path d="M0 12 Q60 4 120 12 T240 12 T360 12 T480 12 T600 12 T720 12 T840 12 T960 12 T1080 12 T1200 12 T1280 12 L1280 0 L0 0 Z"
          fill="#7fc7e8" opacity="0.55"/>
    <path d="M0 20 Q60 12 120 20 T240 20 T360 20 T480 20 T600 20 T720 20 T840 20 T960 20 T1080 20 T1200 20 T1280 20"
          fill="none" stroke="#c9edff" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- god-ray shafts slanting from the surface -->
  <g opacity="0.6">
    <polygon points="120,0 220,0 340,314 200,314" fill="url(#shaft)"/>
    <polygon points="380,0 460,0 540,314 420,314" fill="url(#shaft)" opacity="0.7"/>
    <polygon points="760,0 830,0 900,314 800,314" fill="url(#shaft)" opacity="0.6"/>
    <polygon points="1000,0 1080,0 1140,314 1040,314" fill="url(#shaft)" opacity="0.75"/>
  </g>
  <!-- distant whale silhouette in the mid column -->
  <g class="drift" transform="translate(1020,180)" opacity="0.42">
    <path d="M-58 0 C-40 -22 20 -22 44 -4 L64 -12 L58 4 L64 20 L44 12 C20 26 -40 22 -58 0 Z"
          fill="#04162a"/>
    <path d="M-40 -6 L-64 -22 L-52 -2 Z" fill="#04162a"/>
    <circle cx="30" cy="-2" r="1.6" fill="#8ab4d1"/>
  </g>
  <!-- distant fish school -->
  <g transform="translate(160,150)" opacity="0.55" fill="#3a7fa4">
    <path d="M0 0 l-8 -3 l0 6 z"/>
    <path d="M14 -4 l-8 -3 l0 6 z"/>
    <path d="M28 2 l-8 -3 l0 6 z"/>
    <path d="M6 8 l-8 -3 l0 6 z"/>
    <path d="M22 12 l-8 -3 l0 6 z"/>
    <path d="M38 -8 l-8 -3 l0 6 z"/>
  </g>
  <!-- rising bubbles across the column -->
  <g fill="#c9edff" opacity="0.55">
    <circle class="rise"  cx="80"   cy="700" r="3"/>
    <circle class="rise2" cx="140"  cy="620" r="2"/>
    <circle class="rise"  cx="220"  cy="740" r="2.6"/>
    <circle class="rise2" cx="380"  cy="660" r="2"/>
    <circle class="rise"  cx="1080" cy="700" r="3"/>
    <circle class="rise2" cx="1180" cy="600" r="2.4"/>
    <circle class="rise"  cx="960"  cy="680" r="2"/>
    <circle class="rise2" cx="1220" cy="740" r="3"/>
    <circle class="rise"  cx="60"   cy="500" r="2"/>
    <circle class="rise2" cx="1150" cy="500" r="2.2"/>
  </g>

  <!-- ============== FAR SEABED RIDGES (soft aqua rim light) ============== -->
  <path d="M0 268 Q140 216 300 252 Q430 280 560 250 Q700 216 840 248 Q1000 282 1120 244 Q1210 222 1280 240 L1280 322 L0 322 Z"
        fill="#0a2a44"/>
  <path d="M0 268 Q140 216 300 252 Q430 280 560 250 Q700 216 840 248 Q1000 282 1120 244 Q1210 222 1280 240"
        fill="none" stroke="#6fd6ff" stroke-width="2.5" opacity="0.35"/>

  <!-- ============== MID SEABED + TRENCH CANYON HINT ============== -->
  <path d="M0 296 Q170 258 340 288 Q480 312 640 296 Q820 272 980 298 Q1140 322 1280 294 L1280 384 L0 384 Z"
        fill="#0c3450"/>
  <!-- coral cluster on the mid ridge (left) -->
  <g transform="translate(206,258)">
    <ellipse cx="0" cy="46" rx="26" ry="4" fill="#02101c" opacity="0.55"/>
    <path d="M0 44 q-4 -22 -14 -30 M-14 14 q-6 -8 -10 -20 M-14 14 q4 -10 6 -22"
          fill="none" stroke="#e17aa5" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M6 42 q4 -20 12 -28 M18 14 q6 -6 12 -14 M18 14 q-2 -10 -6 -22"
          fill="none" stroke="#ff9bb5" stroke-width="4.5" stroke-linecap="round"/>
    <circle class="twinkle" cx="-14" cy="-6" r="2.4" fill="#ffd6e7"/>
    <circle class="twinkle2" cx="16" cy="-6" r="2.4" fill="#ffd6e7"/>
  </g>
  <!-- kelp on the right -->
  <g transform="translate(1030,262)">
    <path d="M0 60 Q-6 30 2 0 Q10 -20 4 -40" fill="none" stroke="#2f8770" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <path d="M18 62 Q22 34 14 8 Q6 -14 18 -34" fill="none" stroke="#4bb896" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <path d="M-14 60 Q-20 34 -12 10 Q-4 -12 -18 -32" fill="none" stroke="#2f8770" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- horizon mist (fog of the deep) -->
  <g filter="url(#soft2)" opacity="0.55">
    <ellipse cx="420" cy="326" rx="230" ry="26" fill="#7fc7e8" opacity="0.22"/>
    <ellipse cx="900" cy="332" rx="260" ry="24" fill="#7fc7e8" opacity="0.2"/>
  </g>

  <!-- ============== KENJI'S — the destination shore, cables emerge here ==============
       far shore in warm register: a broad shoreline crescent across the
       horizon so the destination READS from anywhere on screen, plus a
       stilted beach house with warm windows. Drawn AFTER seabed layers so
       it reads in front. -->
  <!-- big warm halo behind the shore -->
  <circle cx="742" cy="294" r="150" fill="url(#homeGlow)"/>
  <!-- far shore silhouette headland cresting above the water column -->
  <path d="M620 296 Q680 250 742 258 Q808 250 872 300 L872 340 L620 340 Z"
        fill="#3a2a18" opacity="0.9"/>
  <path d="M620 296 Q680 250 742 258 Q808 250 872 300"
        fill="none" stroke="#f4a259" stroke-width="2.4" opacity="0.55"/>
  <!-- sand strip at the waterline (broader, warmer) -->
  <path d="M624 316 Q700 300 786 306 Q844 310 868 324 L868 344 L624 344 Z"
        fill="#e9c48a" opacity="0.95"/>
  <path d="M624 316 Q700 300 786 306 Q844 310 868 324"
        fill="none" stroke="#fff0c8" stroke-width="1.8" opacity="0.7"/>
  <!-- beach house on stilts, centered on the shore -->
  <g transform="translate(742,290) scale(1.25)">
    <ellipse cx="0" cy="26" rx="36" ry="4.5" fill="#2b1d0a" opacity="0.55"/>
    <!-- stilts -->
    <g stroke="#8a5a2c" stroke-width="3" stroke-linecap="round">
      <line x1="-14" y1="6" x2="-14" y2="26"/>
      <line x1="14" y1="6" x2="14" y2="26"/>
    </g>
    <!-- body -->
    <path d="M-22 6 v-14 l22 -16 22 16 v14 z" fill="#7a4a24"
          stroke="#ffd166" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- warm windows -->
    <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#ffd166"/>
    <rect x="-17" y="-8" width="7" height="7" rx="1.5" fill="#ffe9b0" opacity="0.95"/>
    <rect x="10" y="-8" width="7" height="7" rx="1.5" fill="#ffe9b0" opacity="0.95"/>
    <!-- lantern hanging under the eaves -->
    <circle cx="0" cy="-26" r="3.4" fill="#ffe9b0"/>
    <line x1="0" y1="-30" x2="0" y2="-38" stroke="#ffe9b0" stroke-width="1.4"/>
    <!-- little palm frond -->
    <path d="M22 -8 q10 -14 4 -22 M22 -8 q14 -6 20 -18 M22 -8 q6 -6 6 -18"
          fill="none" stroke="#4bb896" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
  </g>
  <!-- a second, smaller building tucked to the side (village feel) -->
  <g transform="translate(818,320) scale(0.7)">
    <path d="M-16 6 v-10 l16 -12 16 12 v10 z" fill="#5a3a20"
          stroke="#ffd166" stroke-width="2" stroke-linejoin="round"/>
    <rect x="-4" y="-4" width="8" height="8" rx="1.5" fill="#ffe9b0"/>
  </g>
  <!-- cables emerge from the water and climb onto the sand at Kenji's door -->
  <g stroke="#6fd6ff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.95">
    <path d="M714 318 Q724 306 742 302"/>
    <path d="M770 320 Q756 308 742 302"/>
  </g>

  <!-- ===================== SEABED (foreground floor) ===================== -->
  <rect y="314" width="1280" height="486" fill="url(#seabed)"/>
  <!-- silty pebbles / plankton motes -->
  <g fill="#7fc7e8" opacity="0.45">
    <circle cx="150" cy="420" r="3"/><circle cx="260" cy="500" r="4"/>
    <circle cx="90" cy="610" r="4"/><circle cx="330" cy="660" r="5"/>
    <circle cx="1080" cy="470" r="4"/><circle cx="1180" cy="560" r="5"/>
    <circle cx="990" cy="640" r="4"/><circle cx="1240" cy="690" r="5"/>
  </g>
  <g fill="#6fd6ff" opacity="0.6">
    <circle class="twinkle"  cx="205" cy="465" r="3"/>
    <circle class="twinkle2" cx="1130" cy="520" r="3"/>
    <circle class="twinkle"  cx="60"  cy="530" r="3"/>
    <circle class="twinkle2" cx="1035" cy="580" r="3.4"/>
  </g>
  <g fill="#c9edff" opacity="0.55">
    <circle class="twinkle"  cx="285" cy="560" r="3"/>
    <circle class="twinkle2" cx="140" cy="500" r="2.6"/>
    <circle class="twinkle"  cx="1210" cy="620" r="3.4"/>
    <circle class="twinkle2" cx="945" cy="560" r="3"/>
  </g>

  <!-- ============ TRENCH DARKNESS (painted UNDER the cables) ============
       a hollow carved into the seabed just below the LEFT arc's apex.
       Rim = jagged rocky cliff; interior = deep dark. The left cable
       (painted next) visibly runs across it. -->
  <ellipse cx="536" cy="454" rx="180" ry="46" fill="url(#trenchDark)"/>
  <!-- dark canyon interior (a hollow shape, wider at top) -->
  <path d="M388 456
           Q410 442 430 448 Q450 454 470 442 Q492 432 512 448 Q532 462 552 446
           Q574 432 596 448 Q616 462 640 448 Q664 434 682 452 Q702 468 720 452
           L714 508 Q560 540 400 512 Z"
        fill="#02101c" opacity="0.98"/>
  <!-- rim highlight along the jagged top edge (safe aqua, NOT amber) -->
  <path d="M388 456 Q410 442 430 448 Q450 454 470 442 Q492 432 512 448 Q532 462 552 446 Q574 432 596 448 Q616 462 640 448 Q664 434 682 452 Q702 468 720 452"
        fill="none" stroke="#6fd6ff" stroke-width="2.4" opacity="0.65"/>
  <!-- a couple of jagged rock spurs at the near rim (foreground crags) -->
  <g fill="#0a141f" stroke="#1a3550" stroke-width="1.4" stroke-linejoin="round">
    <path d="M410 456 l14 -20 l10 16 z"/>
    <path d="M508 452 l16 -22 l12 18 z"/>
    <path d="M624 452 l14 -20 l10 16 z"/>
    <path d="M690 456 l12 -18 l10 14 z"/>
  </g>

  <!-- ============== THE CABLE: one trunk, forking, arriving ==============
       both branches end at Kenji's doorstep — same destination, two
       routes. LEFT dips into the TRENCH (bonus). RIGHT rises to the
       SATELLITE buoy (slow). -->
  <!-- trunk we run along -->
  <path d="M470 800 Q520 645 606 532 L674 532 Q760 645 810 800 Z" fill="url(#cableBody)"/>
  <!-- LEFT ribbon (trench dip): tight arc to the left side of Kenji's door -->
  <path d="M606 532 C455 455 505 352 718 314 L734 322 C540 368 500 452 640 524 Z"
        fill="url(#cableBody)"/>
  <!-- RIGHT ribbon (satellite bounce): wide sweep to the right side -->
  <path d="M674 532 C870 470 940 372 766 322 L750 316 C900 372 830 462 640 524 Z"
        fill="url(#cableBody)"/>
  <!-- fork notch fill -->
  <path d="M606 532 L640 522 L674 532 Q640 558 606 532 Z" fill="url(#cableBody)"/>

  <!-- the SATELLITE bounce STAINS its road: subtle amber wash near the
       right rise (500ms danger read) — the SLOW road is amber-tinted -->
  <path d="M674 532 C870 470 940 372 766 322 L750 316 C900 372 830 462 640 524 Z"
        fill="url(#slowStain)" opacity="0.55"/>

  <!-- edge light: aqua glow on the cables; the SLOW road's outer edge is amber -->
  <g fill="none" stroke-linecap="round">
    <path d="M470 800 Q520 645 606 532" stroke="#a5eaff" stroke-width="4.5" opacity="0.95"/>
    <path d="M606 532 C455 455 505 352 718 314" stroke="#a5eaff" stroke-width="4.5" opacity="0.95"/>
    <path d="M810 800 Q760 645 674 532" stroke="#a5eaff" stroke-width="4.5" opacity="0.95"/>
    <path d="M674 532 C870 470 940 372 766 322" stroke="#ffc48a" stroke-width="4.5" opacity="0.95"/>
  </g>
  <g stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M640 524 C500 452 540 368 734 322" stroke="#6fd6ff"/>
    <path d="M640 524 C830 462 900 372 750 316" stroke="#ffc48a"/>
  </g>

  <!-- cable clamps / anchor pins along the seabed -->
  <g fill="#1a5578" stroke="#0a2a44" stroke-width="1.5">
    <rect x="470" y="770" width="14" height="8" rx="2"/>
    <rect x="622" y="646" width="12" height="7" rx="2"/>
    <rect x="796" y="770" width="14" height="8" rx="2"/>
    <rect x="646" y="646" width="12" height="7" rx="2"/>
    <rect x="524" y="424" width="10" height="6" rx="2"/>
    <rect x="800" y="440" width="10" height="6" rx="2"/>
  </g>

  <!-- marching signal pulses along the cables (dashes), bright and tapering -->
  <g fill="#eafbff">
    <ellipse cx="640" cy="754" rx="13" ry="6.5"/>
    <ellipse cx="640" cy="682" rx="11" ry="5.4"/>
    <ellipse cx="640" cy="618" rx="9" ry="4.4"/>
    <ellipse cx="640" cy="562" rx="7.5" ry="3.6"/>
    <!-- left spine (fewer hops — bonus trench route) -->
    <ellipse cx="557" cy="459" rx="6" ry="3"/>
    <ellipse cx="563" cy="401" rx="4.6" ry="2.3"/>
    <ellipse cx="631" cy="349" rx="3.4" ry="1.7"/>
    <!-- right spine (more hops — long satellite bounce) -->
    <ellipse cx="770" cy="475" rx="6" ry="3" fill="#ffe4c0"/>
    <ellipse cx="829" cy="430" rx="5.2" ry="2.6" fill="#ffe4c0"/>
    <ellipse cx="847" cy="386" rx="4.4" ry="2.2" fill="#ffe4c0"/>
    <ellipse cx="815" cy="345" rx="3.6" ry="1.8" fill="#ffe4c0"/>
    <ellipse cx="777" cy="326" rx="3" ry="1.5" fill="#ffe4c0"/>
  </g>

  <!-- ============ TRENCH AURA + INHABITANTS (painted OVER cables) ============
       little bioluminescent motes rising out of the trench + a curious
       octopus peeking over the near rim. The trench darkness itself is
       painted UNDER the cables (see block above) so the cable reads as
       running across the canyon mouth. Aqua = bonus, NOT warning. -->
  <ellipse cx="540" cy="452" rx="130" ry="18" fill="url(#trenchGlow)" opacity="0.7"/>
  <g fill="#6fd6ff" opacity="0.95">
    <circle class="rise"  cx="480" cy="470" r="2.4"/>
    <circle class="rise2" cx="540" cy="486" r="2"/>
    <circle class="rise"  cx="600" cy="472" r="2.6"/>
    <circle class="rise2" cx="510" cy="488" r="1.8"/>
    <circle class="rise"  cx="580" cy="490" r="2.2"/>
    <circle class="rise2" cx="440" cy="472" r="2"/>
    <circle class="rise"  cx="660" cy="478" r="2"/>
    <circle class="rise2" cx="420" cy="484" r="1.8"/>
    <circle class="rise"  cx="700" cy="486" r="2"/>
  </g>
  <!-- a curious octopus peeking over the near rim of the trench -->
  <g class="drift" transform="translate(462,466)" opacity="0.95">
    <ellipse cx="0" cy="0" rx="18" ry="14" fill="#7a3f6b"/>
    <ellipse cx="-5" cy="-4" rx="5" ry="4" fill="#a86494" opacity="0.85"/>
    <g stroke="#7a3f6b" stroke-width="3.6" stroke-linecap="round" fill="none">
      <path d="M-12 6 q-4 12 -12 14"/>
      <path d="M-5 10 q-2 14 -6 22"/>
      <path d="M2 12 q2 14 -2 22"/>
      <path d="M9 10 q6 12 6 20"/>
      <path d="M14 4 q10 8 14 12"/>
    </g>
    <circle cx="-8" cy="-4" r="1.7" fill="#0a141f"/>
    <circle cx="-2" cy="-4" r="1.7" fill="#0a141f"/>
  </g>

  <!-- ============ THE SATELLITE BOUNCE — RIGHT cable rises to a buoy ============
       the RIGHT ribbon rises to the surface. A THIN "lift line" tees off
       the right arc's apex and climbs to a surface buoy far to the right,
       clear of Kenji's shore. -->
  <!-- lift-line: cable segment ascending from the right arc to the surface -->

      <path d="M-13 -17.5 h26" stroke="#c9f6ff" stroke-width="4.5" stroke-linecap="round"/>
      <rect x="-21" y="-21" width="42" height="42" rx="10" fill="none" stroke="#0d3d4d" stroke-width="3"/>
      <circle cx="-6" cy="-9" r="2.2" fill="#062733"/><circle cx="6" cy="-9" r="2.2" fill="#062733"/>
      <text y="14" text-anchor="middle" font-family="ui-rounded, system-ui" font-size="22" font-weight="800" fill="#062733">5</text>
    </g>
  </g>
  <g transform="translate(764,688)">
    <ellipse cy="34" rx="28" ry="6" fill="#02101c" opacity="0.55"/>
    <g class="bob">
      <circle r="44" fill="url(#fragGlow)"/>
      <rect x="-24" y="-24" width="48" height="48" rx="11" fill="#6ee7ff"/>
      <path d="M-15 -20.5 h30" stroke="#c9f6ff" stroke-width="5" stroke-linecap="round"/>
      <rect x="-24" y="-24" width="48" height="48" rx="11" fill="none" stroke="#0d3d4d" stroke-width="3"/>
