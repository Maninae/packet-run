<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gate P1 mock — Act 1 road view</title>
<!-- Hand-composed junction scene, NO engine hookup (design/11 step 1), v3
     after reviewer round 1 (game-feel + kid-UX lenses, both TUNE):
     · both forks REJOIN at Grandma's on the horizon (same destination,
       two routes — a real property of the map)
     · left arc small/steep = visibly shorter; right arc sweeps wide = long
     · the storm stains its road amber down the ribbon (500ms danger read)
     · sun removed — the storm owns the warm register; Grandma's glow is
       the second light; sky pushed cerulean→rose→cream (not hazard-amber)
     · shadows under everything + edge highlights = the 2.5D flip
     · dashes brighter/bigger (marching centerline), hop dots enlarged
     · fragments get eyes; Pip 20% bigger with a backlit rim
     Animation classes live on INNER groups (CSS transform overrides the
     SVG transform attribute). "quiet" text kept: 1:1 with the in-game chip. -->
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0d2036; overflow: hidden; }
  .scene { position: fixed; inset: 0; }
  svg { width: 100%; height: 100%; display: block; }

  .tag {
    position: fixed; top: 10px; left: 12px; z-index: 2;
    font: 600 11px ui-monospace, Menlo, monospace; letter-spacing: 0.05em;
    color: rgba(238, 252, 243, 0.6); background: rgba(10, 26, 40, 0.55);
    padding: 4px 8px; border-radius: 6px;
  }

  .float   { animation: float 2.8s ease-in-out infinite alternate; }
  .float2  { animation: float 3.4s ease-in-out infinite alternate-reverse; }
  .bob     { animation: bob 3.6s ease-in-out infinite alternate; }
  .twinkle { animation: twinkle 2.2s ease-in-out infinite alternate; }
  .twinkle2{ animation: twinkle 3.1s ease-in-out infinite alternate-reverse; }
  .blink   { animation: blink 2.4s steps(1) infinite; }
  @keyframes float   { from { transform: translateY(-5px); } to { transform: translateY(6px); } }
  @keyframes bob     { from { transform: translateY(-4px); } to { transform: translateY(5px); } }
  @keyframes twinkle { from { opacity: 0.25; } to { opacity: 0.9; } }
  @keyframes blink   { 0% { opacity: 1; } 55% { opacity: 0.15; } 100% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .float, .float2, .bob, .twinkle, .twinkle2, .blink { animation: none; }
  }
</style>
</head>
<body>
<div class="tag">GATE P1 MOCK · ACT 1 · HOME &amp; NEIGHBORHOOD · road view · v5</div>
<div class="scene">
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMax slice" role="img"
     aria-label="A grassy road forks ahead at dusk, both branches curving back to Grandma's glowing house on the horizon. A storm hangs over the short left road; the long right road is quiet.">

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#14395e"/>
      <stop offset="0.42" stop-color="#276b8c"/>
      <stop offset="0.72" stop-color="#a86487"/>
      <stop offset="0.88" stop-color="#f3c2a0"/>
      <stop offset="1"    stop-color="#ffe9b0"/>
    </linearGradient>
    <radialGradient id="homeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#ffe6a8" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#ffd166" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="meadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6d49"/>
      <stop offset="1" stop-color="#123524"/>
    </linearGradient>
    <linearGradient id="roadBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f9668"/>
      <stop offset="1" stop-color="#74c288"/>
    </linearGradient>
    <linearGradient id="stormStain" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0"    stop-color="#f4a259" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#f4a259" stop-opacity="0.28"/>
      <stop offset="1"    stop-color="#e8944c" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="stormLight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f4a259" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f4a259" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fragGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6ee7ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6ee7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pipGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe9b0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">

    </filter>
    <filter id="soft2" x="-40%" y="-40%" width="180%" height="180%">

  <!-- ===================== SKY ===================== -->

    <circle class="twinkle2" cx="240" cy="128" r="1.3"/>
    <circle class="twinkle"  cx="420" cy="52"  r="1.5"/>

        fill="#153c50"/>
  <path d="M0 268 Q140 216 300 252 Q430 280 560 250 Q700 216 840 248 Q1000 282 1120 244 Q1210 222 1280 240"

    <path d="M580 442 l12 -9" fill="none"/>
  </g>
  <g transform="translate(560,330) scale(1.1)">
