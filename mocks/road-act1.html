<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gate P1 mock — Act 1 road view</title>
<!-- Hand-composed junction scene, NO engine hookup (design/11 build order
     step 1). The chase-cam read: you hang behind the five fragments on one
     road that forks ahead; the short road climbs left under a storm, the
     long road rolls right and quiet. Signposts carry the exact glyph-chip
     forecast language. Animation classes live on INNER groups — CSS
     transforms override SVG transform attributes (learned the hard way). -->
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #071a1c; overflow: hidden; }
  .scene { position: fixed; inset: 0; }
  svg { width: 100%; height: 100%; display: block; }

  .tag {
    position: fixed; top: 10px; left: 12px; z-index: 2;
    font: 600 11px ui-monospace, Menlo, monospace; letter-spacing: 0.05em;
    color: rgba(238, 252, 243, 0.55); background: rgba(7, 26, 28, 0.55);
    padding: 4px 8px; border-radius: 6px;
  }

  .float   { animation: float 2.8s ease-in-out infinite alternate; }
  .float2  { animation: float 3.4s ease-in-out infinite alternate-reverse; }
  .bob     { animation: bob 3.6s ease-in-out infinite alternate; }
  .twinkle { animation: twinkle 2.2s ease-in-out infinite alternate; }
  .twinkle2{ animation: twinkle 3.1s ease-in-out infinite alternate-reverse; }
  .blink   { animation: blink 2.4s steps(1) infinite; }
  @keyframes float   { from { transform: translateY(-5px); } to { transform: translateY(6px); } }
  @keyframes bob     { from { transform: translateY(-4px); } to { transform: translateY(5px); } }
  @keyframes twinkle { from { opacity: 0.25; } to { opacity: 0.9; } }
  @keyframes blink   { 0% { opacity: 1; } 55% { opacity: 0.15; } 100% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .float, .float2, .bob, .twinkle, .twinkle2, .blink { animation: none; }
  }
</style>
</head>
<body>
<div class="tag">GATE P1 MOCK · ACT 1 · HOME &amp; NEIGHBORHOOD · road view</div>
<div class="scene">
<svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMax slice" role="img"
     aria-label="A grassy road forks ahead at dusk. A storm hangs over the left road; the right road is quiet. Five glowing fragments and Pip stand ready.">
  <defs>
    <!-- dusk sky: deep teal night above, warm gold pooling at the horizon -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0a2233"/>
      <stop offset="0.45" stop-color="#155049"/>
      <stop offset="0.78" stop-color="#3f7a4e"/>
      <stop offset="0.93" stop-color="#e8a95b"/>
      <stop offset="1"    stop-color="#ffcf7a"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#ffe6a8" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#ffcf7a" stop-opacity="0.5"/>
      <stop offset="1"   stop-color="#ffcf7a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="townGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd166" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="meadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a6242"/>
      <stop offset="1" stop-color="#10301f"/>
    </linearGradient>
    <linearGradient id="roadBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f9668"/>
      <stop offset="1" stop-color="#69b57e"/>
    </linearGradient>
    <radialGradient id="stormLight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f4a259" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f4a259" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fragGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6ee7ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6ee7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pipGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd166" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="soft2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- ===================== SKY ===================== -->
  <rect width="1280" height="312" fill="url(#sky)"/>
  <circle cx="748" cy="224" r="150" fill="url(#sunGlow)"/>
  <circle cx="748" cy="226" r="30" fill="#ffe9b0"/>
  <g fill="#eafff2">
    <circle class="twinkle"  cx="120" cy="60"  r="1.8"/>
    <circle class="twinkle2" cx="240" cy="128" r="1.3"/>
    <circle class="twinkle"  cx="420" cy="52"  r="1.5"/>
    <circle class="twinkle2" cx="560" cy="100" r="1.2"/>
    <circle class="twinkle"  cx="900" cy="64"  r="1.7"/>
    <circle class="twinkle2" cx="1060" cy="40" r="1.4"/>
    <circle class="twinkle"  cx="1180" cy="120" r="1.6"/>
    <circle class="twinkle2" cx="1005" cy="150" r="1.1"/>
    <circle class="twinkle"  cx="320" cy="180" r="1.1"/>
  </g>
  <path d="M980 130 q7 -7 14 0 M994 130 q7 -7 14 0" stroke="#0d2b31" stroke-width="2.4"
        fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ============== FAR HILLS + TOWN GLOW ============== -->
  <path d="M0 268 Q140 216 300 252 Q430 280 560 250 Q700 216 840 248 Q1000 282 1120 244 Q1210 222 1280 240 L1280 320 L0 320 Z"
        fill="#0e3f41"/>
  <!-- Grandma's town, far east: the destination is a warm glow, not a node -->
  <circle cx="1120" cy="258" r="90" fill="url(#townGlow)"/>
  <g fill="#ffd166">
    <rect x="1086" y="248" width="5" height="6" rx="1" opacity="0.9"/>
    <rect x="1102" y="240" width="4" height="5" rx="1" opacity="0.75"/>
    <rect x="1121" y="247" width="5" height="6" rx="1" opacity="0.9"/>
    <rect x="1140" y="241" width="4" height="5" rx="1" opacity="0.7"/>
    <rect x="1154" y="250" width="5" height="5" rx="1" opacity="0.85"/>
  </g>

  <!-- ============== MID HILLS + RELAY + HOUSES ============== -->
  <path d="M0 296 Q170 258 340 288 Q480 312 640 292 Q820 268 980 296 Q1140 320 1280 292 L1280 380 L0 380 Z"
        fill="#12513f"/>
  <g transform="translate(196,232)" stroke="#0b3532" fill="none" stroke-width="5" stroke-linecap="round">
    <path d="M0 62 L10 0 L20 62 M-14 62 h68 M2 40 h16 M5 22 h10" />
    <circle class="blink" cx="10" cy="-6" r="5" fill="#ff8b6b" stroke="none"/>
  </g>
  <g transform="translate(1010,300)">
    <path d="M0 34 v-18 l26 -18 26 18 v18 z" fill="#0c3c36"/>
    <rect x="18" y="18" width="9" height="9" rx="2" fill="#ffd166"/>
    <path d="M64 34 v-14 l20 -14 20 14 v14 z" fill="#0c3c36"/>
    <rect x="78" y="22" width="8" height="8" rx="2" fill="#ffc966" opacity="0.9"/>
  </g>

  <!-- horizon mist (fog-of-detail lives at distance) -->
  <g filter="url(#soft2)" opacity="0.5">
    <ellipse cx="420" cy="322" rx="230" ry="26" fill="#bfe8d2" opacity="0.28"/>
    <ellipse cx="880" cy="330" rx="260" ry="24" fill="#bfe8d2" opacity="0.22"/>
  </g>

  <!-- ===================== MEADOW GROUND ===================== -->
  <rect y="312" width="1280" height="488" fill="url(#meadow)"/>
  <g fill="#8deda2" opacity="0.5">
    <circle cx="150" cy="420" r="3"/><circle cx="260" cy="500" r="4"/>
    <circle cx="90" cy="610" r="5"/><circle cx="330" cy="660" r="5"/>
    <circle cx="1080" cy="470" r="4"/><circle cx="1180" cy="560" r="5"/>
    <circle cx="990" cy="640" r="5"/><circle cx="1240" cy="690" r="6"/>
  </g>
  <g fill="#ffd166" opacity="0.55">
    <circle cx="205" cy="465" r="3"/><circle cx="1130" cy="520" r="3"/>
    <circle cx="60" cy="530" r="3"/><circle cx="1035" cy="580" r="4"/>
  </g>

  <!-- ============== THE ROAD: one trunk, forking ahead ============== -->
  <!-- trunk we stand on -->
  <path d="M470 800 Q520 640 604 530 L676 530 Q760 640 810 800 Z" fill="url(#roadBody)"/>
  <!-- left ribbon (short road) -->
  <path d="M604 530 Q520 430 444 340 L460 336 Q560 430 640 522 Z" fill="url(#roadBody)"/>
  <!-- right ribbon (long road) -->
  <path d="M676 530 Q764 434 906 334 L890 330 Q740 428 640 522 Z" fill="url(#roadBody)"/>
  <!-- fill the fork notch so the split reads as one paved Y -->
  <path d="M604 530 L640 522 L676 530 Q640 560 604 530 Z" fill="url(#roadBody)"/>

  <!-- edge light: trunk edges flow continuously into each fork's outer edge -->
  <g stroke="#a5ffc4" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M470 800 Q520 640 604 530 Q520 430 444 340"/>
    <path d="M810 800 Q760 640 676 530 Q764 434 906 334"/>
  </g>
  <g stroke="#7bd88f" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M640 526 Q560 430 460 336"/>
    <path d="M640 526 Q740 428 890 330"/>
  </g>

  <!-- signal dashes marching along each spine, shrinking with depth -->
  <g fill="#eafff2" opacity="0.95">
    <ellipse cx="640" cy="756" rx="11" ry="5.5"/>
    <ellipse cx="640" cy="688" rx="9.5" ry="4.6"/>
    <ellipse cx="640" cy="624" rx="8" ry="3.8"/>
    <ellipse cx="640" cy="566" rx="6.5" ry="3"/>
    <!-- left spine -->
    <ellipse cx="577" cy="463" rx="5" ry="2.4"/>
    <ellipse cx="514" cy="400" rx="4" ry="1.9"/>
    <ellipse cx="464" cy="347" rx="3" ry="1.4"/>
    <!-- right spine -->
    <ellipse cx="737" cy="461" rx="5" ry="2.4"/>
    <ellipse cx="829" cy="396" rx="4" ry="1.9"/>
    <ellipse cx="888" cy="344" rx="3" ry="1.4"/>
  </g>

  <!-- ============ ROADSIDE TREES (receding) ============ -->
  <g>
    <g transform="translate(316,398)">
      <rect x="-4" y="12" width="8" height="22" rx="3" fill="#1d4a38"/>
      <circle r="26" fill="#2f7a52"/><circle cx="-14" cy="8" r="16" fill="#2f7a52"/>
      <circle cx="13" cy="7" r="17" fill="#39905f"/>
    </g>
    <g transform="translate(232,470)">
      <rect x="-5" y="16" width="10" height="30" rx="4" fill="#1d4a38"/>
      <circle r="34" fill="#2f7a52"/><circle cx="-18" cy="10" r="20" fill="#39905f"/>
      <circle cx="17" cy="9" r="21" fill="#2f7a52"/>
    </g>
    <g transform="translate(118,584)">
      <rect x="-7" y="22" width="14" height="42" rx="5" fill="#1d4a38"/>
      <circle r="48" fill="#2f7a52"/><circle cx="-26" cy="14" r="28" fill="#39905f"/>
      <circle cx="24" cy="12" r="29" fill="#2f7a52"/>
      <circle cx="-8" cy="-22" r="24" fill="#45a56d"/>
    </g>
    <g transform="translate(1006,412)">
      <rect x="-4" y="14" width="8" height="24" rx="3" fill="#1d4a38"/>
      <circle r="28" fill="#2f7a52"/><circle cx="14" cy="8" r="18" fill="#39905f"/>
    </g>
    <g transform="translate(1132,530)">
      <rect x="-6" y="20" width="12" height="36" rx="5" fill="#1d4a38"/>
      <circle r="42" fill="#2f7a52"/><circle cx="-22" cy="12" r="24" fill="#39905f"/>
      <circle cx="20" cy="10" r="25" fill="#45a56d"/>
    </g>
  </g>

  <!-- ============ THE STORM, AT DEPTH ON THE LEFT ROAD ============ -->
  <ellipse cx="452" cy="350" rx="110" ry="24" fill="url(#stormLight)"/>
  <g transform="translate(452,242)">
    <g class="bob">
      <g filter="url(#soft)" opacity="0.55">
        <ellipse cx="0" cy="8" rx="88" ry="32" fill="#b26a33"/>
      </g>
      <circle cx="-44" cy="6" r="28" fill="#f4a259"/>
      <circle cx="-11" cy="-11" r="36" fill="#f7b26e"/>
      <circle cx="27" cy="0" r="30" fill="#f4a259"/>
      <circle cx="52" cy="12" r="21" fill="#e8944c"/>
      <ellipse cx="2" cy="19" rx="62" ry="17" fill="#e8944c"/>
      <path d="M-2 32 L-14 62 L-2 62 L-16 98 L14 56 L2 56 L14 32 Z"
            fill="#ffe08a" stroke="#b26a33" stroke-width="2" stroke-linejoin="round"/>
      <g stroke="#f4a259" stroke-width="3" stroke-linecap="round" opacity="0.75">
        <path d="M-56 40 l-5 14"/><path d="M-32 44 l-5 14"/>
        <path d="M32 42 l-5 14"/><path d="M54 36 l-5 14"/>
      </g>
    </g>
  </g>

  <!-- ============ SIGNPOSTS (the forecast, diegetic) ============ -->
  <!-- LEFT: storm eyeing #2 #4, 4 hops -->
  <g transform="translate(304,446)">
    <rect x="-5" y="-6" width="10" height="124" rx="4" fill="#1d4a38"/>
    <g transform="translate(0,-14)">
      <rect x="-92" y="-58" width="184" height="72" rx="16" fill="#12352b"
            stroke="#f4a259" stroke-width="3.5"/>
      <g transform="translate(-70,-42)">
        <circle cx="7" cy="12" r="9" fill="#f4a259"/>
        <circle cx="19" cy="6" r="11" fill="#f7b26e"/>
        <circle cx="30" cy="13" r="8" fill="#f4a259"/>
        <path d="M17 20 l-5 11 h5 l-6 14 l12 -16 h-5 l6 -9 z" fill="#ffe08a"/>
      </g>
      <text x="18" y="-18" font-family="ui-rounded, system-ui" font-size="26"
            font-weight="800" fill="#ffb867">#2 #4</text>
      <g fill="#9dbcaa">
        <circle cx="-24" cy="2" r="4"/><circle cx="-8" cy="2" r="4"/>
        <circle cx="8" cy="2" r="4"/><circle cx="24" cy="2" r="4"/>
      </g>
    </g>
  </g>
  <!-- RIGHT: quiet, 7 hops -->
  <g transform="translate(1010,452)">
    <rect x="-5" y="-6" width="10" height="118" rx="4" fill="#1d4a38"/>
    <g transform="translate(0,-14)">
      <rect x="-84" y="-56" width="168" height="70" rx="16" fill="#12352b"
            stroke="#7bd88f" stroke-width="3.5"/>
      <text x="0" y="-20" text-anchor="middle" font-family="ui-rounded, system-ui"
            font-size="25" font-weight="800" fill="#8deda2">quiet</text>
      <g fill="#9dbcaa">
        <circle cx="-42" cy="0" r="4"/><circle cx="-28" cy="0" r="4"/>
        <circle cx="-14" cy="0" r="4"/><circle cx="0" cy="0" r="4"/>
        <circle cx="14" cy="0" r="4"/><circle cx="28" cy="0" r="4"/>
        <circle cx="42" cy="0" r="4"/>
      </g>
    </g>
  </g>

  <!-- ===================== THE PARTY ===================== -->
  <!-- five fragments in a loose scatter (never a train). Animation classes
       sit on INNER groups so they can't clobber the position transforms. -->
  <ellipse cx="640" cy="742" rx="180" ry="26" fill="#0a2a1e" opacity="0.45"/>
  <g transform="translate(536,682)"><g class="bob">
    <circle r="44" fill="url(#fragGlow)"/>
    <rect x="-24" y="-24" width="48" height="48" rx="11" fill="#6ee7ff"/>
    <rect x="-24" y="-24" width="48" height="48" rx="11" fill="none" stroke="#0d3d4d" stroke-width="3"/>
    <text y="10" text-anchor="middle" font-family="ui-rounded, system-ui" font-size="28" font-weight="800" fill="#062733">1</text>
  </g></g>
  <g transform="translate(594,642)"><g class="float2">
    <circle r="40" fill="url(#fragGlow)"/>
    <rect x="-21" y="-21" width="42" height="42" rx="10" fill="#6ee7ff"/>
    <rect x="-21" y="-21" width="42" height="42" rx="10" fill="none" stroke="#0d3d4d" stroke-width="3"/>
    <text y="9" text-anchor="middle" font-family="ui-rounded, system-ui" font-size="25" font-weight="800" fill="#062733">3</text>
  </g></g>
  <g transform="translate(660,628)"><g class="bob">
    <circle r="38" fill="url(#fragGlow)"/>
    <rect x="-20" y="-20" width="40" height="40" rx="9" fill="#6ee7ff"/>
    <rect x="-20" y="-20" width="40" height="40" rx="9" fill="none" stroke="#0d3d4d" stroke-width="3"/>
    <text y="8" text-anchor="middle" font-family="ui-rounded, system-ui" font-size="23" font-weight="800" fill="#062733">2</text>
  </g></g>
  <g transform="translate(722,650)"><g class="float">
    <circle r="40" fill="url(#fragGlow)"/>
    <rect x="-21" y="-21" width="42" height="42" rx="10" fill="#6ee7ff"/>
    <rect x="-21" y="-21" width="42" height="42" rx="10" fill="none" stroke="#0d3d4d" stroke-width="3"/>
    <text y="9" text-anchor="middle" font-family="ui-rounded, system-ui" font-size="25" font-weight="800" fill="#062733">5</text>
  </g></g>
  <g transform="translate(780,692)"><g class="bob">
    <circle r="44" fill="url(#fragGlow)"/>
    <rect x="-24" y="-24" width="48" height="48" rx="11" fill="#6ee7ff"/>
    <rect x="-24" y="-24" width="48" height="48" rx="11" fill="none" stroke="#0d3d4d" stroke-width="3"/>
    <text y="10" text-anchor="middle" font-family="ui-rounded, system-ui" font-size="28" font-weight="800" fill="#062733">4</text>
  </g></g>
  <!-- Pip, out front — leading the way -->
  <g transform="translate(640,572)"><g class="float">
    <circle r="52" fill="url(#pipGlow)"/>
    <path d="M0 -34 Q12 -12 34 0 Q12 12 0 34 Q-12 12 -34 0 Q-12 -12 0 -34 Z"
          fill="#ffd166" stroke="#8a6215" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="-8" cy="-4" r="3.6" fill="#3a2c00"/>
    <circle cx="8" cy="-4" r="3.6" fill="#3a2c00"/>
    <path d="M-8 7 q8 8 16 0" fill="none" stroke="#3a2c00" stroke-width="3.4" stroke-linecap="round"/>
  </g></g>

  <!-- ===================== FOREGROUND GRASS ===================== -->
  <path d="M0 800 L0 754 Q60 738 120 752 Q180 766 240 748 Q320 726 390 750 L390 800 Z" fill="#0c2c1e"/>
  <path d="M890 800 L890 752 Q960 730 1040 750 Q1120 768 1200 744 Q1245 732 1280 742 L1280 800 Z" fill="#0c2c1e"/>
  <g stroke="#0c2c1e" stroke-width="7" stroke-linecap="round">
    <path d="M60 754 q-4 -22 -14 -30" fill="none"/>
    <path d="M96 752 q2 -24 12 -34" fill="none"/>
    <path d="M300 748 q-2 -20 -12 -28" fill="none"/>
    <path d="M1000 748 q-3 -22 -13 -30" fill="none"/>
    <path d="M1176 744 q3 -24 13 -32" fill="none"/>
  </g>
  <g fill="#ffe08a">
    <circle class="twinkle"  cx="180" cy="700" r="4"/>
    <circle class="twinkle2" cx="340" cy="732" r="3"/>
    <circle class="twinkle"  cx="1060" cy="712" r="4"/>
    <circle class="twinkle2" cx="948" cy="690" r="3"/>
    <circle class="twinkle"  cx="1216" cy="668" r="3.4"/>
  </g>
</svg>
</div>
</body>
</html>
